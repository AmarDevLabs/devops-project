name: Terraform Apply

on:
  push:
    branches:
      - main

jobs:
  dev:
    name: Apply DEV
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-south-1

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init DEV
        run: terraform init -reconfigure -backend-config="key=dev/devops-project/terraform.tfstate"

      - name: Terraform Apply DEV
        run: terraform apply -auto-approve -var-file="envs/dev/terraform.tfvars"

  prod:
    name: Apply PROD
    runs-on: ubuntu-latest
    needs: dev   # 🔥 ensures no parallel execution

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-south-1

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init PROD
        run: terraform init -reconfigure -backend-config="key=prod/devops-project/terraform.tfstate"

      - name: Terraform Apply PROD
        run: terraform apply -auto-approve -var-file="envs/prod/terraform.tfvars"
