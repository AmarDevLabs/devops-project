name: Terraform Workflow

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: terraform
  cancel-in-progress: true

jobs:

  # ========================
  # DEV PLAN
  # ========================
  dev-plan:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-south-1

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean Terraform
        run: rm -rf .terraform .terraform.lock.hcl

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init DEV
        run: terraform init -reconfigure -backend-config="key=dev/devops-project/terraform.tfstate"

      - name: Validate
        run: terraform validate

      - name: Plan DEV
        run: terraform plan -var-file="envs/dev/terraform.tfvars"

  # ========================
  # DEV APPLY
  # ========================
  dev-apply:
    needs: dev-plan
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-south-1

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean Terraform
        run: rm -rf .terraform .terraform.lock.hcl

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init DEV
        run: terraform init -reconfigure -backend-config="key=dev/devops-project/terraform.tfstate"

      - name: Plan DEV
        run: terraform plan -no-color -var-file="envs/dev/terraform.tfvars" > plan-dev.txt

      - name: Re-init for PROD
        run: terraform init -reconfigure -backend-config="key=prod/devops-project/terraform.tfstate"

      - name: Plan PROD
        run: terraform plan -no-color -var-file="envs/prod/terraform.tfvars" > plan-prod.txt

      - name: Check for destructive changes
        run: |
          if grep -E "^- " plan-dev.txt plan-prod.txt; then
            echo "❌ Destructive changes detected! Failing."
            exit 1
          else
            echo "✅ No destructive changes"
          fi

      - name: Comment PR with Terraform Plans
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const devPlan = fs.readFileSync('terraform/plan-dev.txt', 'utf8');
            const prodPlan = fs.readFileSync('terraform/plan-prod.txt', 'utf8');

            const body = `## 🧾 Terraform Plan

            ### 🔹 DEV
            \`\`\`
            ${devPlan}
            \`\`\`

            ### 🔹 PROD
            \`\`\`
            ${prodPlan}
            \`\`\`
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # ========================
  # PROD PLAN
  # ========================
  prod-plan:
    needs: dev-apply
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-south-1

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean Terraform
        run: rm -rf .terraform .terraform.lock.hcl

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init PROD
        run: terraform init -reconfigure -backend-config="key=prod/devops-project/terraform.tfstate"

      - name: Plan PROD
        run: terraform plan -var-file="envs/prod/terraform.tfvars"

  # ========================
  # PROD APPLY (MANUAL APPROVAL)
  # ========================
  prod-apply:
    needs: prod-plan
    runs-on: ubuntu-latest
    environment: prod   # ✅ Correct placement

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-south-1

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean Terraform
        run: rm -rf .terraform .terraform.lock.hcl

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init PROD
        run: terraform init -reconfigure -backend-config="key=prod/devops-project/terraform.tfstate"

      - name: Apply PROD
        run: terraform apply -auto-approve -var-file="envs/prod/terraform.tfvars"
