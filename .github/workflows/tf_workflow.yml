name: Terraform Workflow

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: terraform
  cancel-in-progress: true

jobs:
  # ========================
  # PR: DEV PLAN
  # ========================
  dev-plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-south-1

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean Terraform
        run: rm -rf .terraform .terraform.lock.hcl

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init DEV
        run: terraform init -reconfigure -backend-config="key=dev/devops-project/terraform.tfstate"

      - name: Validate
        run: terraform validate

      - name: Plan DEV
        run: terraform plan -no-color -var-file="envs/dev/terraform.tfvars" > plan-dev.txt

      - name: Upload DEV plan
        uses: actions/upload-artifact@v4
        with:
          name: plan-dev
          path: terraform/plan-dev.txt

  # ========================
  # PR: PROD PLAN
  # ========================
  prod-plan-pr:
    if: github.event_name == 'pull_request'
    needs: dev-plan
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-south-1

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean Terraform
        run: rm -rf .terraform .terraform.lock.hcl

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init PROD
        run: terraform init -reconfigure -backend-config="key=prod/devops-project/terraform.tfstate"

      - name: Validate
        run: terraform validate

      - name: Plan PROD
        run: terraform plan -no-color -var-file="envs/prod/terraform.tfvars" > plan-prod.txt

      - name: Upload PROD plan
        uses: actions/upload-artifact@v4
        with:
          name: plan-prod
          path: terraform/plan-prod.txt

  # ========================
  # PR: CHECK + COMMENT
  # ========================
  comment-pr-plans:
    if: github.event_name == 'pull_request'
    needs: [dev-plan, prod-plan-pr]
    runs-on: ubuntu-latest

    steps:
      - name: Download DEV plan
        uses: actions/download-artifact@v4
        with:
          name: plan-dev
          path: terraform

      - name: Download PROD plan
        uses: actions/download-artifact@v4
        with:
          name: plan-prod
          path: terraform

      - name: Check for destructive changes
        working-directory: terraform
        run: |
          if grep -E '^([[:space:]]*-|-/\+)' plan-dev.txt plan-prod.txt; then
            echo "❌ Destructive or replacement changes detected! Failing."
            exit 1
          else
            echo "✅ No destructive changes"
          fi

      - name: Comment PR with Terraform Plans
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const devPlan = fs.readFileSync('terraform/plan-dev.txt', 'utf8');
            const prodPlan = fs.readFileSync('terraform/plan-prod.txt', 'utf8');

            const truncate = (text, maxLen) =>
              text.length > maxLen ? text.slice(0, maxLen) + '\n...output truncated...' : text;

            const body = `## 🧾 Terraform Plan

### 🔹 DEV
\`\`\`
${truncate(devPlan, 30000)}
\`\`\`

### 🔹 PROD
\`\`\`
${truncate(prodPlan, 30000)}
\`\`\`
`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # ========================
  # PUSH TO MAIN: DEV APPLY
  # ========================
  dev-apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-south-1

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean Terraform
        run: rm -rf .terraform .terraform.lock.hcl

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init DEV
        run: terraform init -reconfigure -backend-config="key=dev/devops-project/terraform.tfstate"

      - name: Validate
        run: terraform validate

      - name: Plan DEV
        run: terraform plan -no-color -var-file="envs/dev/terraform.tfvars" > plan-dev.txt

      - name: Check DEV for destructive changes
        run: |
          if grep -E '^([[:space:]]*-|-/\+)' plan-dev.txt; then
            echo "❌ Destructive or replacement changes detected in DEV! Failing."
            exit 1
          else
            echo "✅ No destructive changes in DEV"
          fi

      - name: Apply DEV
        run: terraform apply -auto-approve -var-file="envs/dev/terraform.tfvars"

  # ========================
  # PUSH TO MAIN: PROD PLAN
  # ========================
  prod-plan:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: dev-apply
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-south-1

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean Terraform
        run: rm -rf .terraform .terraform.lock.hcl

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init PROD
        run: terraform init -reconfigure -backend-config="key=prod/devops-project/terraform.tfstate"

      - name: Validate
        run: terraform validate

      - name: Plan PROD
        run: terraform plan -no-color -var-file="envs/prod/terraform.tfvars" > plan-prod.txt

      - name: Check PROD for destructive changes
        run: |
          if grep -E '^([[:space:]]*-|-/\+)' plan-prod.txt; then
            echo "❌ Destructive or replacement changes detected in PROD! Failing."
            exit 1
          else
            echo "✅ No destructive changes in PROD"
          fi

  # ========================
  # PUSH TO MAIN: PROD APPLY (MANUAL APPROVAL)
  # ========================
  prod-apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: prod-plan
    runs-on: ubuntu-latest
    environment: prod

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-south-1

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean Terraform
        run: rm -rf .terraform .terraform.lock.hcl

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init PROD
        run: terraform init -reconfigure -backend-config="key=prod/devops-project/terraform.tfstate"

      - name: Validate
        run: terraform validate

      - name: Plan PROD again before apply
        run: terraform plan -no-color -var-file="envs/prod/terraform.tfvars" > plan-prod.txt

      - name: Check PROD again for destructive changes
        run: |
          if grep -E '^([[:space:]]*-|-/\+)' plan-prod.txt; then
            echo "❌ Destructive or replacement changes detected in PROD! Failing."
            exit 1
          else
            echo "✅ No destructive changes in PROD"
          fi

      - name: Apply PROD
        run: terraform apply -auto-approve -var-file="envs/prod/terraform.tfvars"
