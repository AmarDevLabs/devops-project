name: Terraform Plan

on:
  pull_request:
    branches:
      - main

jobs:
  dev:
    name: Plan DEV
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-south-1 

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Clean Terraform directory
        run: rm -rf .terraform .terraform.lock.hcl

      - name: Terraform Init DEV
        run: terraform init -reconfigure -backend-config="key=dev/devops-project/terraform.tfstate"

      - name: Terraform Plan DEV
        run: terraform plan -var-file="envs/dev/terraform.tfvars" -no-color

  prod:
    name: Plan PROD
    runs-on: ubuntu-latest
    needs: dev

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-south-1 

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        
      - name: Clean Terraform directory
        run: rm -rf .terraform .terraform.lock.hcl
    
      - name: Terraform Init PROD
        run: terraform init -reconfigure -backend-config="key=prod/devops-project/terraform.tfstate"

      - name: Terraform Plan PROD
        run: terraform plan -var-file="envs/prod/terraform.tfvars" -no-color
