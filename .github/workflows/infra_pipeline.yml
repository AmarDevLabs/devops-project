name: Infrastructure Pipeline

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/global/**'
      - 'terraform/dev/**'
      - 'terraform/prod/**'
      - 'terraform/scripts/**'
      - 'terraform/k8s-dev/**'
      - '.github/workflows/infra_pipeline.yml'
  push:
    branches: [main]
    paths:
      - 'terraform/global/**'
      - 'terraform/dev/**'
      - 'terraform/prod/**'
      - 'terraform/scripts/**'
      - 'terraform/k8s-dev/**'  
      - '.github/workflows/infra_pipeline.yml'

permissions:
  contents: read

concurrency:
  group: infra-pipeline-main
  cancel-in-progress: false

jobs:
  global:
    name: Global
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-south-1

    defaults:
      run:
        working-directory: terraform/global

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init GLOBAL
        run: |
          terraform init \
            -reconfigure \
            -backend-config="bucket=amar-devops-tfstate-2026-001" \
            -backend-config="key=global/devops-project/terraform.tfstate" \
            -backend-config="region=ap-south-1" \
            -backend-config="dynamodb_table=terraform-locks"

      - name: Validate GLOBAL
        run: terraform validate

      - name: Plan GLOBAL
        if: github.event_name == 'pull_request'
        run: terraform plan -var-file="terraform.tfvars"

      - name: Apply GLOBAL
        if: github.event_name == 'push'
        run: terraform apply -auto-approve -var-file="terraform.tfvars"

  dev:
    name: Dev
    needs: global
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-south-1

    defaults:
      run:
        working-directory: terraform/dev

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init DEV
        run: |
          terraform init \
            -reconfigure \
            -backend-config="bucket=amar-devops-tfstate-2026-001" \
            -backend-config="key=dev/devops-project/terraform.tfstate" \
            -backend-config="region=ap-south-1" \
            -backend-config="dynamodb_table=terraform-locks"

      - name: Validate DEV
        run: terraform validate

      - name: Plan DEV
        if: github.event_name == 'pull_request'
        run: terraform plan -var-file="terraform.tfvars"

      - name: Apply DEV
        if: github.event_name == 'push'
        run: terraform apply -auto-approve -var-file="terraform.tfvars"

  prod:
    name: Prod
    needs: dev
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    environment: prod

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-south-1

    defaults:
      run:
        working-directory: terraform/prod

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init PROD
        run: |
          terraform init \
            -reconfigure \
            -backend-config="bucket=amar-devops-tfstate-2026-001" \
            -backend-config="key=prod/devops-project/terraform.tfstate" \
            -backend-config="region=ap-south-1" \
            -backend-config="dynamodb_table=terraform-locks"

      - name: Validate PROD
        run: terraform validate

      - name: Plan PROD
        run: terraform plan -var-file="terraform.tfvars"

      - name: Apply PROD
        run: terraform apply -auto-approve -var-file="terraform.tfvars"
