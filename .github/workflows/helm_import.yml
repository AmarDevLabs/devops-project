name: Terraform O11y Import

on:
  workflow_dispatch:

jobs:
  import:
    runs-on: prod-k8s
    defaults:
      run:
        working-directory: terraform/o11y-prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Import Grafana
        run: terraform import -input=false helm_release.grafana grafana-prod/grafana

      - name: Import Loki
        run: terraform import -input=false helm_release.loki loki-prod/loki

      - name: Terraform Plan
        run: terraform plan
